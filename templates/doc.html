<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Documentation RAML</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-black.css">
  <style>
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1020;
      color: #e7eef7;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
    }
    code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body class="w3-light-grey">

  <div class="w3-top">
    <div class="w3-bar w3-theme w3-top w3-left-align w3-large">
      <a href="/" class="w3-bar-item w3-button w3-theme-l1">Accueil</a>
      <a href="/doc" class="w3-bar-item w3-button w3-hide-small w3-hover-white">Doc</a>
    </div>
  </div>

  <div class="w3-content" style="max-width:1100px; margin-top:72px;">
    <div class="w3-card w3-white w3-padding-large" style="border-radius:10px;">
      <h1 class="w3-text-teal">Documentation (RAML)</h1>
      <p class="w3-small w3-opacity">Représentation HTML du document RAML du service web.</p>
      <pre><code>{{ raml_text | e }}</code></pre>
    </div>
  </div>

</body>
</html>
