<!DOCTYPE html>
<html lang="fr">
<head>
  <title>{{ title }}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-black.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
  <style>html,body,h1,h2,h3,h4,h5,h6 {font-family: "Roboto", sans-serif;}</style>
</head>
<body class="w3-light-grey">
  <div class="w3-top">
    <div class="w3-bar w3-theme w3-top w3-left-align w3-large">
      <a href="/" class="w3-bar-item w3-button w3-theme-l1">Accueil</a>
    </div>
  </div>
  <div class="w3-content" style="max-width:800px; margin-top:72px;">
    <div class="w3-card w3-white w3-padding-large">
      <h1 class="w3-text-red">{{ title }}</h1>
      <p>{{ message }}</p>
    </div>
  </div>
</body>
</html>
